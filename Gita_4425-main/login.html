<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login Page</title>
    <link rel="stylesheet" href="./css/parsley.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #4facfe, #00f2fe, #43e97b);
            padding: 20px;
        }

        .form {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            text-align: center;
            color:red;
            margin-bottom: 25px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .form-label {
            color: #fff;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .form-control {
            height: 48px;
            border: none;
            border-radius: 12px;
            padding: 10px 15px;
            font-size: 15px;
            background: rgba(255, 255, 255, 0.9);
            transition: 0.3s;
        }

        .form-control:focus {
            background: #fff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.7);
            transform: scale(1.02);
        }

        .form-control::placeholder {
            color: #666;
        }

        button {
            width: 48%;
            height: 48px;
            border: none !important;
            border-radius: 12px !important;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #007bff, #0056b3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 123, 255, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff4b5c, #c9184a);
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 75, 92, 0.4);
        }

        #message {
            text-align: center;
            margin-bottom: 15px;
            font-size: 14px;
            font-weight: 600;
        }

        p {
            color: #ffe6e6;
            font-size: 13px;
            margin-top: 5px;
            margin-bottom: 0;
        }

        .btn-box {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-top: 10px;
        }

        /* Tablet */
        @media (max-width: 768px) {
            .form {
                padding: 28px;
            }
        }

        /* Mobile */
        @media (max-width: 576px) {
            body {
                padding: 15px;
            }

            .form {
                padding: 22px;
                border-radius: 15px;
            }

            h2 {
                font-size: 26px;
            }

            .form-control {
                height: 44px;
                font-size: 14px;
            }

            .btn-box {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div>

        <div class="col-lg-12 form">
            <h2>Login Here</h2>
            <p id="message"></p>
            <form id="frm">

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input class="form-control" type="email" id="email" placeholder="Enter your email" name="email"
                        required required required data-parsley-required-message="Enter Your Email"
                        data-parsley-error-container="#email-error">
                    <p id="email-error"></p>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input class="form-control" type="password" id="password" placeholder="Enter password"
                        name="password" required name="password" required
                        data-parsley-required-message="Enter your password" data-parsley-pattern="^[A-Za-z0-9]+$"
                        data-parsely-pattern-message="password should be combination of Letter and Numbers"
                        data-parsley-error-container="#password-error">
                    <p id="password-error"></p><br />
                </div>

                <button type="submit" class="btn btn-primary">Login</button>
                <button type="reset" class="btn btn-danger">Clear</button>
            </form>
        </div>

    </div>
    <script src="./js/jquery-3.6.0.min.js"></script>
    <script src="./js/parsley.js"></script>

    <script>

       let users = JSON.parse(localStorage.getItem("regUser")) || [];

let frmdata = document.getElementById("frm");

frmdata.addEventListener("submit", function (e) {

    e.preventDefault();

    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    if (email === users.email && password === users.password) {

        window.location.href = "index.html";

    } else {

        document.getElementById("message").innerHTML =
            "<b>Email or Password is invalid</b>";

        document.getElementById("message").style.color = "red";
    }

});
    </script>
</body>

</html>
